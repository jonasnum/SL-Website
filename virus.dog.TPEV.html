        <h1>Canine Parvovirus (CPV)</h1>
        <p>Canine Parvovirus (CPV) is a highly contagious viral disease that affects dogs, particularly puppies. It causes severe gastrointestinal symptoms and can be fatal if not treated promptly. Vaccination is key to prevention.</p>
